<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Online Magazin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'magazin:time_table_list' %}">Online Magazin</a>

        <!-- SEARCH -->
        <form class="d-flex ms-3" method="get" action="{% url 'magazin:time_table_list' %}">
            <input class="form-control me-2" type="search" name="search" placeholder="Search"
                   value="{{ request.GET.search|default:'' }}">
            <button class="btn btn-outline-light" type="submit">Search</button>
        </form>

        <!-- Auth Buttons -->
        <div class="d-flex ms-auto">
            {% if request.user.is_authenticated %}
                <span class="text-white me-3 d-flex align-items-center">
                    Salom, {{ request.user.username }}!
                </span>
                <a href="{% url 'magazin:profil_list' %}" class="btn btn-outline-light me-2">Profil</a>
                <a href="{% url 'magazin:time_table_create' %}" class="btn btn-primary me-2">Yuklash</a>
                <a href="{% url 'users:logout' %}" class="btn btn-danger">Chiqish</a>
            {% else %}
                <a href="{% url 'users:login' %}" class="btn btn-outline-light me-2">Kirish</a>
                <a href="{% url 'users:register' %}" class="btn btn-success">Ro'yxatdan o'tish</a>
            {% endif %}
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container mt-4 flex-grow-1">
    {% block content %}
    {% endblock %}
</div>

<!-- Footer + QR code -->
<footer class="bg-dark text-white text-center p-3 mt-auto">
    <p class="mb-1">2026 Online Magazin</p>
    <div class="d-flex justify-content-center align-items-center mt-2">
        <div class="text-center">
            <h6>📱 QR orqali jadvalga kirish</h6>
            <img src="{% url 'magazin:qr' %}" width="120" alt="QR Code">
        </div>
    </div>
</footer>

</body>
</html>
