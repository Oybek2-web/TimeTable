{% extends 'base.html' %}

{% block title %}Kirish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm p-4">
            <h2 class="mb-4 text-center">Kirish</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100 mt-2">Kirish</button>
            </form>
            <a href="{% url 'password_reset' %}">Forgot Password</a>
        </div>
    </div>
</div>
</div>
{% endblock %}
